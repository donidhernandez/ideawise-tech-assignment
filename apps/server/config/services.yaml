# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

parameters:
    app.uploads_dir: '%kernel.project_dir%/var/uploads'
    app.storage_dir: '%kernel.project_dir%/var/storage'
    app.max_upload_size: '%env(int:MAX_UPLOAD_SIZE)%'
    app.chunk_size: '%env(int:CHUNK_SIZE)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            $maxUploadSize: '%app.max_upload_size%'
            $chunkSize: '%app.chunk_size%'

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Controller\:
        resource: '../src/Controller/'
        tags: ['controller.service_arguments']

    App\Service\ChunkStorage:
        arguments:
            $uploadsDir: '%app.uploads_dir%'

    App\Service\FileAssembler:
        arguments:
            $storageDir: '%app.storage_dir%'

    App\Command\CleanupUploadsCommand:
        arguments:
            $storageDir: '%app.storage_dir%'
