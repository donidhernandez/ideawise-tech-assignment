# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

parameters:
    app.uploads_dir: '%kernel.project_dir%/var/uploads'
    app.storage_dir: '%kernel.project_dir%/var/storage'
    app.max_upload_size: '%env(int:MAX_UPLOAD_SIZE)%'
    app.chunk_size: '%env(int:CHUNK_SIZE)%'
    app.chunk_state_backend: '%env(default:default_chunk_state_backend:CHUNK_STATE_BACKEND)%'
    default_chunk_state_backend: 'filesystem'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            $maxUploadSize: '%app.max_upload_size%'
            $chunkSize: '%app.chunk_size%'

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Controller\:
        resource: '../src/Controller/'
        tags: ['controller.service_arguments']

    App\Service\ChunkStorage:
        arguments:
            $uploadsDir: '%app.uploads_dir%'

    App\Service\FileAssembler:
        arguments:
            $storageDir: '%app.storage_dir%'

    App\Controller\Api\ServeUploadController:
        arguments:
            $storageDir: '%app.storage_dir%'
        tags: ['controller.service_arguments']

    App\Command\CleanupUploadsCommand:
        arguments:
            $storageDir: '%app.storage_dir%'

    App\Controller\Api\Admin\AdminStatsController:
        arguments:
            $storageDir: '%app.storage_dir%'
        tags: ['controller.service_arguments']

    # Predis client. Only instantiated lazily when CHUNK_STATE_BACKEND=redis;
    # the constructor accepts a DSN string so this works against a local
    # redis://localhost:6379 or any production cluster URL.
    Predis\Client:
        arguments:
            $parameters: '%env(default::REDIS_DSN)%'
        public: false

    Predis\ClientInterface: '@Predis\Client'

    # Bind the ChunkStateRepository interface to whichever concrete the
    # CHUNK_STATE_BACKEND env var selects. Default: filesystem.
    App\Service\ChunkStateRepository:
        factory: ['@App\Service\ChunkStateRepositoryFactory', 'create']

    App\Service\ChunkStateRepositoryFactory:
        arguments:
            $backend: '%app.chunk_state_backend%'
